name: AI日报飞书推送

on:
  schedule:
    - cron: '30 23 * * *'  # 每天北京时间 07:30
  workflow_dispatch:        # 支持手动触发

jobs:
  push-news:
    runs-on: ubuntu-latest
    steps:
      - name: 安装依赖
        run: pip install deep-translator

      - name: 抓取AI新闻并推送飞书
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          python3 << 'EOF'
          import urllib.request
          import json
          import re
          import os
          from datetime import datetime, timezone, timedelta
          from deep_translator import GoogleTranslator

          FEISHU_WEBHOOK = os.environ["FEISHU_WEBHOOK"]

          AI_KEYWORDS = [
              "artificial intelligence", "LLM", "GPT", "Claude", "Gemini",
              "OpenAI", "Anthropic", "DeepMind", "machine learning", "language model",
              "agent", "neural network", "chatbot", "Llama", "Mistral", "Grok",
              "diffusion", "multimodal", "robotics", "AGI",
              "人工智能", "大模型", "深度学习", "生成式", "智能体", "多模态"
          ]

          ASCII_KW = [k for k in AI_KEYWORDS if k.isascii()]
          CN_KW    = [k for k in AI_KEYWORDS if not k.isascii()]
          ASCII_RE = re.compile(r"\b(?:" + "|".join(re.escape(k) for k in ASCII_KW) + r")\b", re.IGNORECASE)

          def is_ai_related(text):
              return bool(ASCII_RE.search(text)) or any(k in text for k in CN_KW)

          def translate(text):
              try:
                  return GoogleTranslator(source="auto", target="zh-CN").translate(text[:500])
              except Exception:
                  return text

          def fetch_hn_top_ai(limit=200, top_n=5):
              """从 Hacker News 按热度抓取 AI 相关新闻"""
              try:
                  with urllib.request.urlopen(
                      "https://hacker-news.firebaseio.com/v0/topstories.json", timeout=10
                  ) as r:
                      story_ids = json.loads(r.read())[:limit]
              except Exception as e:
                  print(f"HN topstories 获取失败: {e}")
                  return []

              ai_stories = []
              for sid in story_ids:
                  try:
                      with urllib.request.urlopen(
                          f"https://hacker-news.firebaseio.com/v0/item/{sid}.json", timeout=5
                      ) as r:
                          item = json.loads(r.read())
                      if not item or item.get("type") != "story":
                          continue
                      title = item.get("title", "")
                      url = item.get("url", f"https://news.ycombinator.com/item?id={sid}")
                      score = item.get("score", 0)
                      if is_ai_related(title):
                          ai_stories.append({"title": title, "url": url, "score": score, "source": "Hacker News"})
                  except Exception:
                      continue

              # 按热度分数排序取前 top_n
              ai_stories.sort(key=lambda x: x["score"], reverse=True)
              return ai_stories[:top_n]

          def fetch_chinese_ai(top_n=3):
              """从中文媒体补充中国AI动态"""
              sources = [
                  ("https://www.jiqizhixin.com/rss", "机器之心"),
                  ("https://www.qbitai.com/feed", "量子位"),
              ]
              items = []
              for url, name in sources:
                  try:
                      req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                      with urllib.request.urlopen(req, timeout=10) as resp:
                          content = resp.read().decode("utf-8", errors="ignore")
                      rss_items = re.findall(r"<item>(.*?)</item>", content, re.DOTALL)
                      for item in rss_items[:5]:
                          title = re.search(r"<title>(?:<!\[CDATA\[)?(.*?)(?:\]\]>)?</title>", item, re.DOTALL)
                          link = re.search(r"<link>(.*?)</link>", item, re.DOTALL)
                          if title and link:
                              t = re.sub(r"<[^>]+>", "", title.group(1)).strip()
                              l = link.group(1).strip()
                              if t and l and is_ai_related(t):
                                  items.append({"title": t, "url": l, "score": 0, "source": name})
                  except Exception as e:
                      print(f"[{name}] 抓取失败: {e}")
              return items[:top_n]

          def push_to_feishu(news_list):
              tz_shanghai = timezone(timedelta(hours=8))
              date_str = datetime.now(tz_shanghai).strftime("%Y-%m-%d")
              emojis = ["🔥", "🔥", "📌", "📌", "📌"]
              lines = [f"🤖 AI日报 | {date_str}"]
              for i, item in enumerate(news_list[:5]):
                  emoji = emojis[i]
                  title_zh = translate(item["title"]) if not any(ord(c) > 127 for c in item["title"]) else item["title"]
                  score_str = f"  ▲{item['score']}" if item["score"] > 0 else ""
                  lines.append(f"\n{emoji} Top {i+1}: {title_zh}{score_str}\n来源：{item['source']}\n🔗 {item['url']}")
              lines.append("\n由 Claude AI 自动汇总")
              message = "\n".join(lines)
              payload = json.dumps({"msg_type": "text", "content": {"text": message}}).encode("utf-8")
              for attempt in range(2):
                  try:
                      req = urllib.request.Request(
                          FEISHU_WEBHOOK, data=payload,
                          headers={"Content-Type": "application/json"}, method="POST"
                      )
                      with urllib.request.urlopen(req, timeout=15) as resp:
                          result = json.loads(resp.read().decode())
                          if result.get("code") == 0:
                              print(f"✅ 推送成功: {date_str}")
                              return True
                          else:
                              print(f"❌ 推送失败 (attempt {attempt+1}): {result}")
                  except Exception as e:
                      print(f"❌ 推送异常 (attempt {attempt+1}): {e}")
              return False

          # 主逻辑：HN 热榜 AI 新闻（全球热度排名）+ 中文媒体补充
          hn_news = fetch_hn_top_ai(limit=200, top_n=5)
          zh_news = fetch_chinese_ai(top_n=3)

          # 合并去重，HN优先（已按热度排序），不足5条用中文补
          seen = set()
          final = []
          for item in hn_news + zh_news:
              if item["title"] not in seen and len(final) < 5:
                  seen.add(item["title"])
                  final.append(item)

          push_to_feishu(final)
          EOF
