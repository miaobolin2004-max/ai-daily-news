name: AI日报飞书推送

on:
  schedule:
    - cron: '30 23 * * *'  # 每天北京时间 07:30
  workflow_dispatch:        # 支持手动触发

jobs:
  push-news:
    runs-on: ubuntu-latest
    steps:
      - name: 抓取AI新闻并推送飞书
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          python3 << 'EOF'
          import urllib.request
          import json
          import re
          import os
          from datetime import datetime, timezone, timedelta

          FEISHU_WEBHOOK = os.environ["FEISHU_WEBHOOK"]

          SOURCES = [
              ("https://feeds.feedburner.com/TechCrunch/", "TechCrunch"),
              ("https://www.artificialintelligence-news.com/feed/", "AI News"),
              ("https://openai.com/news/rss.xml", "OpenAI"),
              ("https://deepmind.google/blog/rss/", "DeepMind"),
              ("https://techcrunch.com/category/artificial-intelligence/feed/", "TC-AI"),
          ]

          def fetch_rss(url, source_name, timeout=15):
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      content = resp.read().decode("utf-8", errors="ignore")
                  items = re.findall(r"<item>(.*?)</item>", content, re.DOTALL)
                  results = []
                  for item in items[:5]:
                      title = re.search(r"<title>(?:<!\[CDATA\[)?(.*?)(?:\]\]>)?</title>", item, re.DOTALL)
                      link = re.search(r"<link>(.*?)</link>", item, re.DOTALL)
                      desc = re.search(r"<description>(?:<!\[CDATA\[)?(.*?)(?:\]\]>)?</description>", item, re.DOTALL)
                      if title and link:
                          t = re.sub(r"<[^>]+>", "", title.group(1)).strip()
                          l = link.group(1).strip()
                          d = re.sub(r"<[^>]+>", "", desc.group(1) if desc else "").strip()[:80]
                          if t and l:
                              results.append({"title": t, "url": l, "summary": d, "source": source_name})
                  return results
              except Exception as e:
                  print(f"[{source_name}] 抓取失败: {e}")
                  return []

          def filter_ai_news(items):
              keywords = ["AI", "artificial intelligence", "LLM", "GPT", "Claude", "Gemini",
                          "OpenAI", "Anthropic", "DeepMind", "machine learning", "language model",
                          "chatbot", "neural", "robot", "automation", "agent"]
              result = []
              for item in items:
                  text = (item["title"] + " " + item["summary"]).lower()
                  if any(kw.lower() in text for kw in keywords):
                      result.append(item)
              return result

          def push_to_feishu(news_list):
              tz_shanghai = timezone(timedelta(hours=8))
              date_str = datetime.now(tz_shanghai).strftime("%Y-%m-%d")
              emojis = ["🔥", "🔥", "📌", "📌", "📌"]
              lines = [f"🤖 AI日报 | {date_str}"]
              for i, item in enumerate(news_list[:5]):
                  emoji = emojis[i]
                  summary = item["summary"][:60] + "..." if len(item["summary"]) > 60 else item["summary"]
                  lines.append(f"\n{emoji} Top {i+1}: {item['title']}\n{summary}\n🔗 {item['url']}")
              lines.append("\n由 Claude AI 自动汇总")
              message = "\n".join(lines)
              payload = json.dumps({"msg_type": "text", "content": {"text": message}}).encode("utf-8")
              for attempt in range(2):
                  try:
                      req = urllib.request.Request(
                          FEISHU_WEBHOOK, data=payload,
                          headers={"Content-Type": "application/json"}, method="POST"
                      )
                      with urllib.request.urlopen(req, timeout=15) as resp:
                          result = json.loads(resp.read().decode())
                          if result.get("code") == 0:
                              print(f"✅ 推送成功: {date_str}")
                              return True
                          else:
                              print(f"❌ 推送失败 (attempt {attempt+1}): {result}")
                  except Exception as e:
                      print(f"❌ 推送异常 (attempt {attempt+1}): {e}")
              return False

          all_items = []
          for url, name in SOURCES:
              all_items.extend(fetch_rss(url, name))

          ai_news = filter_ai_news(all_items)
          seen, unique = set(), []
          for item in ai_news:
              if item["title"] not in seen:
                  seen.add(item["title"])
                  unique.append(item)

          push_to_feishu(unique[:5] if unique else all_items[:5])
          EOF
